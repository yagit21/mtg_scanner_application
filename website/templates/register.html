{% extends "base.html" %}
{% block title %}
Register
{% endblock %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h1>
            Create Account
        </h1>

        <p>
            Join ManaVault
        </p>

        <input id="username" placeholder="Username">

        <input id="email" placeholder="Email">
        <input id="password" type="password" placeholder="Password">
        <button id="register-btn">
            Register
        </button>
        <p>
            Already have
            an account?
            <a href="/login">
                Login
            </a>
        </p>
    </div>
</div>

<script
src="{{ url_for('static', filename='auth.js') }}">
</script>

{% endblock %}
