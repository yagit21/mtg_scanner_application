{% extends "base.html" %}

{% block title %}
ManaVault Scanner
{% endblock %}

{% block content %}

<div class="page-header">

    <h1>
        MTG Scanner
    </h1>

    <p>
        Scan cards instantly
    </p>

</div>

<div class="scanner-grid">

    <div class="scanner-section">

        <div class="camera-card">

            <video id="webcam" autoplay playsinline></video>

            <div class="camera-buttons">

                <button id="scan-btn">
                    Scan Card
                </button>

                <button id="flip-btn">
                    Flip Camera
                </button>

            </div>

            <canvas id="canvas"></canvas>

        </div>

    </div>

    <div id="result-panel">

        <div class="card-image">

            <img
                id="card-art"
                src=""
                alt="Card">

        </div>

        <div class="card-info">

            <h2 id="card-name">
                Scan a card to begin
            </h2>

            <p id="card-type"></p>

            <p id="card-text"></p>

            <p id="card-price"></p>

            <p id="confidence"></p>

            <button id="save-btn">
                Save Card
            </button>

        </div>

    </div>

</div>

<div
id="login-popup"
class="popup">

    <div class="popup-card">

        <h2>
            Login Required
        </h2>

        <p>
            You must login to
            save cards.
        </p>

        <a href="/login">

            <button>
                Login
            </button>
        </a>
    </div>

</div>

<script
src="{{ url_for('static', filename='scanner.js') }}">
</script>

{% endblock %}
